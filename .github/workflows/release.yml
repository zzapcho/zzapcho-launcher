name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version, for example 1.0.0-beta.1
        required: true
        default: 1.0.0-beta.1
      prerelease:
        description: Mark GitHub Release as pre-release
        required: true
        default: true
        type: boolean
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    env:
      PACKAGE_VERSION: ${{ github.event.inputs.version }}
      PRERELEASE: ${{ github.event.inputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION)) {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
            "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          }

      - name: Build Velopack package
        shell: pwsh
        run: .\scripts\package.ps1 -Version $env:PACKAGE_VERSION

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zzapcho.Launcher-win-x64-release
          path: artifacts/releases/win-x64

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "v$env:PACKAGE_VERSION" }
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $args = @(
              'release',
              'create',
              $tag,
              '--title',
              "Zzapcho Raid Launcher $env:PACKAGE_VERSION",
              '--notes-file',
              'RELEASE_NOTES.md'
            )
            if ($env:PRERELEASE -eq 'true') {
              $args += '--prerelease'
            }
            gh @args
          }

          gh release upload $tag artifacts\releases\win-x64\* --clobber
