name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.0.1 등 태그를 push하면 빌드 & 릴리즈

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 빌드 & GitHub Release 배포
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
